name: "[AUTOMATICA] Minha primeira Action Bonita!!"

on:
  push:
    branches:
      - main
      - master

jobs:
  meu-job:
    runs-on: ubuntu-latest 

    steps:
      - name: Primeiro Step
        run: |
          echo "The job was automatically triggered by a event."
          echo "This job is nowrunning on a server by GirHub!"
          echo "Hoje é $(TZ='America/Sao_Paulo' date + '%d/%m/%y %H:%M:%S')"
          echo "Meu repositorio se chama: ${{ github.repository }}"
          ls -la
      - name: Git checkout (faz o clone do repo)
        uses: actions/checkout@v6
      - name: "Verifica se o repo foi baixado"
        run: ls -la

      
  segundo-job:
    runs-on: ubuntu-latest 

    steps: 
      - name: Segundo Step
        run: |
          echo "Hoje é $(date)."
          ls -la

      - uses: actions/checkout@v6

      - run: ls -la